version: '3.8'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: straycare_sql
    user: root
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongThePassword!
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql/data

volumes:
  sql_data:
